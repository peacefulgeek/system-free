services:
  - type: web
    name: system-free
    runtime: node
    plan: starter
    region: oregon
    branch: main
    autoDeploy: true
    buildCommand: pnpm install --frozen-lockfile && pnpm build
    startCommand: node scripts/start-with-cron.mjs
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "10000"
      - key: AMAZON_TAG
        value: spankyspinola-20
      - key: AUTO_GEN_ENABLED
        value: "true"
      - key: OPENAI_API_KEY
        value: sk-82bdad0a1fd34987b73030504ae67080
      - key: OPENAI_BASE_URL
        value: https://api.deepseek.com
      - key: OPENAI_MODEL
        value: deepseek-v4-pro
